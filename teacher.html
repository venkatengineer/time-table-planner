<!DOCTYPE html>
<html>
<head>
<title>Teacher Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>Teacher Availability</h1>

<form>

<label>Subject</label>
<select>
<option>Math</option>
<option>Physics</option>
<option>Computer Science</option>
<option>Chemistry</option>
<option>English</option>
</select>

<br><br>

<label>Available Time Slots</label>

<div class="slots">

<label><input type="checkbox"> 9:00 - 10:00</label>
<label><input type="checkbox"> 10:00 - 11:00</label>
<label><input type="checkbox"> 11:00 - 12:00</label>
<label><input type="checkbox"> 1:00 - 2:00</label>
<label><input type="checkbox"> 2:00 - 3:00</label>

</div>

<br>

<button class="submit">Save Availability</button>

</form>

</body>
</html>
