<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        form {
            margin: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            width: 50%;
            margin-left: auto;
            margin-right: auto;
        }

        input, select, button {
            margin: 5px;
            padding: 8px;
        }

        h2 {
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <h1>👨‍💼 Admin Panel</h1>

    <a href="/">
        <button>⬅ Back</button>
    </a>

    <hr>

    <!-- ADD USER -->
    <h2>Add User</h2>
    <form action="/add-user" method="post">
        <input type="text" name="name" placeholder="Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="password" placeholder="Password" required>

        <select name="role">
            <option value="teacher">Teacher</option>
            <option value="student">Student</option>
        </select>

        <br>
        <button type="submit">Add User</button>
    </form>


    <!-- ADD SUBJECT -->
    <h2>Add Subject</h2>
    <form action="/add-subject" method="post">
        <input type="text" name="name" placeholder="Subject Name" required>
        <input type="number" name="weekly_hours" placeholder="Weekly Hours" required>

        <br>
        <button type="submit">Add Subject</button>
    </form>


    <!-- ADD CLASS -->
    <h2>Add Class</h2>
    <form action="/add-class" method="post">
        <input type="text" name="name" placeholder="Class Name" required>
        <input type="number" name="student_count" placeholder="Student Count">

        <br>
        <button type="submit">Add Class</button>
    </form>


    <!-- ASSIGN TEACHER -->
    <h2>Assign Teacher to Subject & Class</h2>
    <form action="/assign-teacher" method="post">

        <label>Teacher:</label>
        <select name="teacher_id">
            {% for teacher in teachers %}
                <option value="{{ teacher.id }}">{{ teacher.name }}</option>
            {% endfor %}
        </select>

        <label>Subject:</label>
        <select name="subject_id">
            {% for subject in subjects %}
                <option value="{{ subject.id }}">{{ subject.name }}</option>
            {% endfor %}
        </select>

        <label>Class:</label>
        <select name="class_id">
            {% for cls in classes %}
                <option value="{{ cls.id }}">{{ cls.name }}</option>
            {% endfor %}
        </select>

        <br>
        <button type="submit">Assign</button>
    </form>


    <!-- ADD TIME SLOT -->
    <h2>Add Time Slot</h2>
    <form action="/add-timeslot" method="post">

        <input type="text" name="day" placeholder="Day (Mon, Tue...)" required>

        <label>Start:</label>
        <input type="time" name="start_time" required>

        <label>End:</label>
        <input type="time" name="end_time" required>

        <label>Break:</label>
        <input type="checkbox" name="is_break">

        <br>
        <button type="submit">Add Slot</button>
    </form>


    <!-- CREATE TIMETABLE -->
    <h2>Create Timetable Entry</h2>
    <form action="/create-timetable" method="post">

        <label>Class:</label>
        <select name="class_id">
            {% for cls in classes %}
                <option value="{{ cls.id }}">{{ cls.name }}</option>
            {% endfor %}
        </select>

        <label>Subject ID:</label>
        <input type="number" name="subject_id" required>

        <label>Teacher ID:</label>
        <input type="number" name="teacher_id" required>

        <label>Time Slot ID:</label>
        <input type="number" name="timeslot_id" required>

        <br>
        <button type="submit">Create</button>
    </form>


    <script src="/static/js/script.js"></script>

</body>
</html>
