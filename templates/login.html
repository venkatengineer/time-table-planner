<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TimeTable Pro</title>
  <link rel="stylesheet" href="/static/css/style.css?v=3.0">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      padding: 20px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      padding: 40px 32px;
      border-radius: 24px;
      background: var(--surface);
      box-shadow:
        14px 14px 28px var(--shadow-dark),
        -14px -14px 28px var(--shadow-light);
      animation: popIn 0.5s ease forwards;
    }
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .brand-icon {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
      box-shadow: 6px 6px 14px rgba(108,99,255,0.3);
      margin: 0 auto 16px;
    }
    .login-title {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-dark);
      letter-spacing: -0.5px;
    }
    .login-subtitle {
      font-size: 14px;
      color: var(--text-light);
      margin-top: 6px;
    }
    .error-msg {
      padding: 12px;
      border-radius: 10px;
      background: rgba(224,92,110,0.1);
      color: var(--danger);
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 20px;
      border-left: 3px solid var(--danger);
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-header">
      <div class="brand-icon">🔒</div>
      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Please enter your details to sign in.</p>
    </div>

    {% if error %}
      <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form action="/login" method="post">
      <input type="hidden" name="role" value="{{ role }}">
      
      <div class="form-group" style="margin-bottom: 24px;">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="admin@school.com" required autofocus>
      </div>
      
      <div class="form-group" style="margin-bottom: 30px;">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 14px; font-size: 16px;">
        Sign In as {{ role | capitalize }}
      </button>
    </form>
    
    <div style="text-align: center; margin-top: 24px; font-size: 13px;">
      <a href="/" style="color: var(--text-light); text-decoration: none; font-weight: 600;">← Back to Home</a>
    </div>
  </div>

  <script src="/static/js/script.js?v=3.0"></script>
</body>
</html>
