<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Timetable — EduSchedule</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Custom ghost element */
        #drag-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            display: none;
            padding: 10px 16px;
            border-radius: 12px;
            background: var(--surface);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25), 0 0 0 2px var(--accent);
            font-family: var(--font);
            font-size: 0.83rem;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            border-left: 3px solid var(--accent);
            transform: rotate(2deg);
            transition: transform 0.1s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
        }

        .slots-filled-tag {
            background: linear-gradient(135deg, var(--accent4), #059669);
            color: #fff;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: 700;
        }

        .week-indicator {
            font-size: 0.82rem;
            color: var(--text2);
            font-weight: 500;
        }

        .cal-row {
            transition: background 0.15s ease;
        }

        /* Ripple on drop */
        @keyframes cellRipple {
            0% {
                box-shadow: 0 0 0 0 rgba(79, 110, 247, 0.5);
            }

            100% {
                box-shadow: 0 0 0 20px rgba(79, 110, 247, 0);
            }
        }

        .drop-cell.ripple {
            animation: cellRipple 0.5s ease;
        }

        .confirm-btn-wrap {
            margin-top: 24px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
    </style>
</head>

<body>
    <div class="page-wrapper">

        <!-- NAVBAR -->
        <nav class="navbar">
            <a class="nav-brand" href="index.html">
                <div class="nav-logo">📅</div>
                <div>
                    <div class="nav-title">EduSchedule</div>
                    <div class="nav-subtitle">Student Portal</div>
                </div>
            </a>
            <div class="nav-actions">
                <a href="index.html" class="nav-back">← Home</a>
                <button class="theme-switch" id="theme-toggle">🌓</button>
            </div>
        </nav>

        <!-- PAGE HEADER -->
        <div class="page-header">
            <h1>📆 My Weekly Timetable</h1>
            <p>Dept. of Computer Science — Semester II, 2025–26 &nbsp;|&nbsp; Drag a faculty card into any calendar slot
                to assign a class.</p>
        </div>

        <div class="page-content">
            <div class="schedule-wrapper">

                <!-- ===================== TEACHER PANEL ===================== -->
                <div class="teacher-panel" id="teacher-panel">
                    <div class="panel-header">
                        <h3>Available Faculty</h3>
                        <span class="panel-count" id="avail-count">10 available</span>
                    </div>

                    <input class="panel-search" id="panel-search" type="text" placeholder="🔍 Search faculty...">

                    <div class="subject-filter" id="subj-filter">
                        <button class="filter-chip active" data-filter="all">All</button>
                        <button class="filter-chip" data-filter="math">Math</button>
                        <button class="filter-chip" data-filter="physics">Physics</button>
                        <button class="filter-chip" data-filter="cs">CS</button>
                        <button class="filter-chip" data-filter="chem">Chemistry</button>
                        <button class="filter-chip" data-filter="english">English</button>
                    </div>

                    <div id="cards-container">
                        <!-- Cards injected by JS -->
                    </div>
                </div>

                <!-- ===================== CALENDAR ===================== -->
                <div class="calendar-section">
                    <div class="cal-toolbar">
                        <div class="cal-week-nav">
                            <button class="cal-nav-btn" id="prev-week">◀</button>
                            <span class="cal-week-label" id="week-label">Week of 3 Mar 2026</span>
                            <button class="cal-nav-btn" id="next-week">▶</button>
                        </div>
                        <div class="cal-actions">
                            <span id="filled-tag" class="slots-filled-tag">0 / 25 filled</span>
                            <button class="btn btn-secondary btn-sm" id="clear-btn">🗑 Clear All</button>
                            <button class="btn btn-primary btn-sm" id="confirm-btn">✔ Confirm Timetable</button>
                        </div>
                    </div>

                    <div class="calendar-grid" id="cal-grid">
                        <!-- Header row -->
                        <div class="cal-header-row" id="cal-header">
                            <div class="cal-col-head"></div>
                            <!-- Day headers injected by JS -->
                        </div>
                        <!-- Body rows injected by JS -->
                        <div class="cal-body" id="cal-body"></div>
                    </div>

                    <!-- Legend -->
                    <div class="cal-status-bar">
                        <div class="status-info">
                            <span class="status-item"><span class="status-dot" style="background:var(--accent4)"></span>
                                Slot Filled</span>
                            <span class="status-item"><span class="status-dot"
                                    style="background:var(--shadow-d)"></span> Empty Slot</span>
                            <span class="status-item"><span class="status-dot"
                                    style="background:rgba(79,110,247,0.4)"></span> Hovering</span>
                        </div>
                        <div class="legend" id="legend"></div>
                    </div>
                </div>
            </div>
        </div>

    </div><!-- page-wrapper -->

    <!-- Drag ghost -->
    <div id="drag-ghost"></div>
    <div id="toast-container"></div>

    <script>
        // =============================================
        //  DATA
        // =============================================
        const TEACHERS = [
            { id: 't1', name: 'Prof. Arun', initials: 'A', subject: 'Mathematics', subj: 'math', emoji: '📐' },
            { id: 't2', name: 'Prof. Ravi', initials: 'R', subject: 'Mathematics', subj: 'math', emoji: '📐' },
            { id: 't3', name: 'Prof. Meena', initials: 'Me', subject: 'Chemistry', subj: 'chem', emoji: '⚗️' },
            { id: 't4', name: 'Prof. Kumar', initials: 'K', subject: 'Physics', subj: 'physics', emoji: '🔭' },
            { id: 't5', name: 'Prof. Deepa', initials: 'D', subject: 'Physics', subj: 'physics', emoji: '🔭' },
            { id: 't6', name: 'Prof. Akash', initials: 'Ak', subject: 'Computer Sc.', subj: 'cs', emoji: '💻' },
            { id: 't7', name: 'Prof. Sita', initials: 'S', subject: 'English', subj: 'english', emoji: '📚' },
            { id: 't8', name: 'Prof. Raj', initials: 'Rj', subject: 'Mathematics', subj: 'math', emoji: '📐' },
            { id: 't9', name: 'Prof. Priya', initials: 'P', subject: 'Computer Sc.', subj: 'cs', emoji: '💻' },
            { id: 't10', name: 'Prof. Nair', initials: 'N', subject: 'Chemistry', subj: 'chem', emoji: '⚗️' },
        ];

        const TIME_SLOTS = [
            '09:00–10:00', '10:00–11:00', '11:00–12:00',
            '12:00–13:00', '13:00–14:00'
        ];

        const DAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];

        // Pre-defined timetable data: { 'rowIndex-colIndex': teacherId }
        const PREDEFINED = {
            '0-0': 't1', '0-1': 't6', '0-2': 't1', '0-3': 't4', '0-4': 't3',
            '1-0': 't4', '1-1': 't2', '1-2': 't6', '1-3': 't7', '1-4': 't1',
            '2-0': 't3', '2-1': 't5', '2-2': 't7', '2-3': 't6', '2-4': 't4',
            '3-0': 't7', '3-2': 't2', '3-4': 't9',
            '4-1': 't10', '4-3': 't5',
        };

        // State
        let schedule = {};       // key: 'row-col' => teacher obj
        let draggedTeacher = null;
        let weekOffset = 0;

        // =============================================
        //  THEME
        // =============================================
        const themeBtn = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeBtn.addEventListener('click', () => {
            const cur = document.documentElement.getAttribute('data-theme');
            const next = cur === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });

        // =============================================
        //  BUILD TEACHER CARDS
        // =============================================
        function buildTeacherCards(filter = 'all', search = '') {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            let count = 0;

            TEACHERS.forEach(t => {
                if (filter !== 'all' && t.subj !== filter) return;
                if (search && !t.name.toLowerCase().includes(search.toLowerCase())) return;

                const isUsed = Object.values(schedule).some(s => s.id === t.id);
                const card = document.createElement('div');
                card.className = `teacher-card subj-${t.subj}${isUsed ? ' placed' : ''}`;
                card.draggable = !isUsed;
                card.dataset.tid = t.id;
                card.innerHTML = `
      <div class="tc-top">
        <div class="tc-avatar avatar-${t.subj}">${t.initials}</div>
        <div class="tc-info">
          <div class="tc-name">${t.name}</div>
          <div class="tc-subject">${t.subject}</div>
        </div>
        <span class="tc-drag-hint">${isUsed ? '✓' : '⠿'}</span>
      </div>
      <span class="tc-badge badge-${t.subj}">${t.subject}</span>
    `;

                if (!isUsed) {
                    card.addEventListener('dragstart', onDragStart);
                    card.addEventListener('dragend', onDragEnd);
                }
                container.appendChild(card);
                count++;
            });

            document.getElementById('avail-count').textContent =
                `${Object.values(schedule).length < TEACHERS.length ? TEACHERS.length - Object.values(new Set(Object.values(schedule).map(s => s.id))).size : 0} available`;
        }

        // =============================================
        //  BUILD CALENDAR
        // =============================================
        function getWeekDates() {
            const today = new Date(2026, 2, 3); // March 3 2026 (Mon)
            const base = new Date(today);
            base.setDate(today.getDate() + weekOffset * 7);
            return DAYS.map((d, i) => {
                const dt = new Date(base);
                dt.setDate(base.getDate() + i);
                return { label: d, date: dt };
            });
        }

        function buildCalendar() {
            const header = document.getElementById('cal-header');
            const body = document.getElementById('cal-body');
            const dates = getWeekDates();

            // Header
            header.innerHTML = '<div class="cal-col-head"></div>';
            const todayStr = new Date().toDateString();
            dates.forEach((d, i) => {
                const isToday = d.date.toDateString() === todayStr;
                header.innerHTML += `
      <div class="cal-col-head${isToday ? ' today' : ''}">
        <span class="cal-day-num">${d.date.getDate()}</span>
        ${d.label}
      </div>`;
            });

            // Rows
            body.innerHTML = '';
            TIME_SLOTS.forEach((slot, ri) => {
                const row = document.createElement('div');
                row.className = 'cal-row';

                const [start] = slot.split('–');
                row.innerHTML = `<div class="cal-time-label">${start}</div>`;

                DAYS.forEach((_, ci) => {
                    const key = `${ri}-${ci}`;
                    const cell = document.createElement('div');
                    cell.className = 'drop-cell';
                    cell.dataset.key = key;

                    if (schedule[key]) {
                        renderEvent(cell, schedule[key]);
                    }

                    cell.addEventListener('dragover', onDragOver);
                    cell.addEventListener('dragleave', onDragLeave);
                    cell.addEventListener('drop', onDrop);
                    row.appendChild(cell);
                });

                body.appendChild(row);
            });

            // Update week label
            const d0 = dates[0].date;
            const d4 = dates[4].date;
            document.getElementById('week-label').textContent =
                `${d0.getDate()} ${d0.toLocaleString('default', { month: 'short' })} – ${d4.getDate()} ${d4.toLocaleString('default', { month: 'short' })} ${d4.getFullYear()}`;

            updateFilled();
            buildLegend();
        }

        function renderEvent(cell, teacher) {
            cell.classList.add('has-event');
            cell.innerHTML = `
    <div class="cal-event event-${teacher.subj}" style="--event-color:var(--subj-${teacher.subj}-color)">
      <button class="cal-event-remove" title="Remove">✕</button>
      <div class="cal-event-name">${teacher.emoji} ${teacher.name}</div>
      <div class="cal-event-sub">${teacher.subject}</div>
    </div>`;
            cell.querySelector('.cal-event-remove').addEventListener('click', (e) => {
                e.stopPropagation();
                const key = cell.dataset.key;
                delete schedule[key];
                cell.classList.remove('has-event');
                cell.innerHTML = '';
                buildTeacherCards(getCurrentFilter(), document.getElementById('panel-search').value);
                updateFilled();
                showToast('✂️ Removed from slot', 'info');
            });
        }

        function updateFilled() {
            const filled = Object.keys(schedule).length;
            const total = TIME_SLOTS.length * DAYS.length;
            document.getElementById('filled-tag').textContent = `${filled} / ${total} filled`;
        }

        function buildLegend() {
            const subjects = [...new Set(Object.values(schedule).map(t => t.subj))];
            const leg = document.getElementById('legend');
            const colors = { math: '#4f6ef7', physics: '#7c3aed', cs: '#06b6d4', chem: '#10b981', english: '#f59e0b', bio: '#ef4444' };
            const labels = { math: 'Mathematics', physics: 'Physics', cs: 'Computer Sc.', chem: 'Chemistry', english: 'English', bio: 'Biology' };
            leg.innerHTML = subjects.map(s =>
                `<div class="legend-item"><span class="legend-dot" style="background:${colors[s]}"></span>${labels[s]}</div>`
            ).join('');
        }

        // =============================================
        //  DRAG & DROP
        // =============================================
        const ghost = document.getElementById('drag-ghost');

        function onDragStart(e) {
            const card = e.currentTarget;
            draggedTeacher = TEACHERS.find(t => t.id === card.dataset.tid);
            card.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', draggedTeacher.id);

            // Invisible default ghost
            const blank = document.createElement('div');
            blank.style.cssText = 'position:fixed;top:-1000px;opacity:0;';
            document.body.appendChild(blank);
            e.dataTransfer.setDragImage(blank, 0, 0);
            setTimeout(() => document.body.removeChild(blank), 0);

            // Show custom ghost
            ghost.innerHTML = `<span>${draggedTeacher.emoji}</span>${draggedTeacher.name}`;
            ghost.style.borderLeftColor = `var(--subj-${draggedTeacher.subj}-color, var(--accent))`;
            ghost.style.opacity = '1';
        }

        document.addEventListener('dragover', e => {
            if (draggedTeacher) {
                ghost.style.left = (e.clientX + 14) + 'px';
                ghost.style.top = (e.clientY - 20) + 'px';
                ghost.style.display = 'flex';
            }
        });

        function onDragEnd(e) {
            e.currentTarget.classList.remove('dragging');
            ghost.style.opacity = '0';
            ghost.style.display = 'none';
            draggedTeacher = null;
        }

        function onDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            e.currentTarget.classList.add('drag-over');
        }

        function onDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function onDrop(e) {
            e.preventDefault();
            const cell = e.currentTarget;
            cell.classList.remove('drag-over');

            if (!draggedTeacher) return;

            const key = cell.dataset.key;
            const prev = schedule[key];

            schedule[key] = draggedTeacher;
            renderEvent(cell, draggedTeacher);

            // Ripple
            cell.classList.add('ripple');
            setTimeout(() => cell.classList.remove('ripple'), 600);

            buildTeacherCards(getCurrentFilter(), document.getElementById('panel-search').value);
            updateFilled();
            buildLegend();

            showToast(`✅ ${draggedTeacher.name} assigned!`, 'success');
        }

        // =============================================
        //  FILTER & SEARCH
        // =============================================
        function getCurrentFilter() {
            return document.querySelector('.filter-chip.active')?.dataset.filter || 'all';
        }

        document.getElementById('subj-filter').addEventListener('click', e => {
            if (!e.target.classList.contains('filter-chip')) return;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            e.target.classList.add('active');
            buildTeacherCards(e.target.dataset.filter, document.getElementById('panel-search').value);
        });

        document.getElementById('panel-search').addEventListener('input', e => {
            buildTeacherCards(getCurrentFilter(), e.target.value);
        });

        // Week nav
        document.getElementById('prev-week').addEventListener('click', () => { weekOffset--; buildCalendar(); });
        document.getElementById('next-week').addEventListener('click', () => { weekOffset++; buildCalendar(); });

        // Clear
        document.getElementById('clear-btn').addEventListener('click', () => {
            if (!Object.keys(schedule).length) return;
            schedule = {};
            buildCalendar();
            buildTeacherCards(getCurrentFilter(), document.getElementById('panel-search').value);
            showToast('🗑️ Timetable cleared', 'info');
        });

        // Confirm
        document.getElementById('confirm-btn').addEventListener('click', () => {
            const filled = Object.keys(schedule).length;
            if (filled === 0) { showToast('⚠️ No slots assigned yet!', 'error'); return; }
            showToast(`🎉 Timetable confirmed! ${filled} slots saved.`, 'success');
        });

        // =============================================
        //  TOAST
        // =============================================
        function showToast(msg, type = 'info') {
            const tc = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.innerHTML = `<span class="toast-icon">${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span><span>${msg}</span>`;
            tc.appendChild(t);
            setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 350); }, 2800);
        }

        // =============================================
        //  LOAD PREDEFINED
        // =============================================
        function loadPredefined() {
            Object.entries(PREDEFINED).forEach(([key, tid]) => {
                const teacher = TEACHERS.find(t => t.id === tid);
                if (teacher) schedule[key] = teacher;
            });
        }

        // =============================================
        //  INIT
        // =============================================
        loadPredefined();
        buildCalendar();
        buildTeacherCards();
    </script>
</body>

</html>
